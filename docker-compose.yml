name: job-scrapper

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobs}
      POSTGRES_DB: ${POSTGRES_DB:-jobs}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobs} -d ${POSTGRES_DB:-jobs}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://jobs:jobs@db:5432/jobs}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_TOKEN: ${API_TOKEN:-}
      STORAGE_AUTO_CREATE: "0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://jobs:jobs@db:5432/jobs}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      SLEEP_PER_COMPANY: ${SLEEP_PER_COMPANY:-0.6}
      STORAGE_AUTO_CREATE: "0"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - exports:/app/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  db_data:
  exports:
  hf_cache:
